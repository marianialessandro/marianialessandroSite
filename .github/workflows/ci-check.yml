name: CI - Build Check

on:
  pull_request:
    branches:
      - main

jobs:
  build-check:
    name: Build Check
    runs-on: ubuntu-latest

    steps:
      - name: 🚚 Get latest code
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 📦 Install dependencies
        run: npm ci

      - name: 🔨 Try to Build
        run: npm run build
      # Niente deploy qui! Se la build fallisce, l'azione diventa rossa.
