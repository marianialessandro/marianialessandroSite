services:
  php:
    build:
      context: ./apps/api.marianialessandro.com
      dockerfile: Dockerfile
    working_dir: /var/www/html
    volumes:
      - ./apps/api.marianialessandro.com:/var/www/html
    environment:
      APP_ENV: docker
      APP_DEBUG: "true"
      APP_URL: http://localhost:8000
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: marianialessandro_api
      DB_USERNAME: marianialessandro
      DB_PASSWORD: marianialessandro
      SESSION_DRIVER: database
      CACHE_STORE: database
      QUEUE_CONNECTION: database
    ports:
      - "8000:8000"
    depends_on:
      mysql:
        condition: service_healthy

  mysql:
    image: mysql:8.4
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: marianialessandro_api
      MYSQL_USER: marianialessandro
      MYSQL_PASSWORD: marianialessandro
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -u root -p$${MYSQL_ROOT_PASSWORD} --silent"]
      interval: 5s
      timeout: 3s
      retries: 20

volumes:
  mysql-data:
